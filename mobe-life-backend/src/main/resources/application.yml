#
# 核心职责：定义所有环境共享的基础配置，并声明默认启用的 Spring Profile。
# 所属业务模块：后端基础设施 / 全局配置。
# 重要依赖关系或外部约束：这里的值会作为 application-dev.yml、application-prod.yml 的共同底座；
# 敏感信息理论上应优先外置到环境变量或更安全的配置中心。
#
spring:
  application:
    # Spring 应用名，主要用于日志、监控、Actuator 等场景展示。
    name: mobe-life-backend
  profiles:
    # 默认激活开发环境配置；生产部署时应通过外部参数覆盖。
    active: dev
logging:
  level:
    # 全局默认日志级别。根级别过高会显著增加日志量。
    root: DEBUG
wechat:
  miniapp:
    # 微信小程序 AppID / Secret。当前仍直接写在配置里，后续更建议转到环境变量。
    app-id: wx5992d0bb44379dea
    app-secret: d8989a5e2d77e9d74fae0f5ec76d3fd1
